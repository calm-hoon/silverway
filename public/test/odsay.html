<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>ODsay API Test</title>
  <style>
    body { font-family: monospace; padding: 24px; background: #f5f5f5; }
    h2 { margin-bottom: 16px; }
    label { display: block; margin-bottom: 4px; font-size: 13px; color: #555; }
    input { width: 100%; max-width: 500px; padding: 8px; margin-bottom: 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; box-sizing: border-box; }
    button { padding: 10px 24px; background: #0A5A75; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
    button:hover { background: #084a60; }
    #result { margin-top: 20px; background: white; border: 1px solid #ddd; border-radius: 4px; padding: 16px; white-space: pre-wrap; font-size: 12px; min-height: 100px; max-height: 600px; overflow: auto; }
    .status { font-size: 13px; margin-top: 8px; }
    .ok { color: green; }
    .err { color: red; }
  </style>
</head>
<body>
  <h2>ODsay API 직접 테스트</h2>

  <label>API Key</label>
  <input type="text" id="apiKey" placeholder="ODsay API 키 입력" />

  <label>출발 경도 (SX)</label>
  <input type="text" id="sx" value="127.3845" />

  <label>출발 위도 (SY)</label>
  <input type="text" id="sy" value="36.3504" />

  <label>도착 경도 (EX)</label>
  <input type="text" id="ex" value="127.3641" />

  <label>도착 위도 (EY)</label>
  <input type="text" id="ey" value="36.3681" />

  <button onclick="runTest()">테스트 실행</button>
  <div class="status" id="status"></div>
  <pre id="result">결과가 여기 표시됩니다.</pre>

  <script>
    function runTest() {
      var apiKey = document.getElementById('apiKey').value.trim();
      var sx = document.getElementById('sx').value.trim();
      var sy = document.getElementById('sy').value.trim();
      var ex = document.getElementById('ex').value.trim();
      var ey = document.getElementById('ey').value.trim();

      if (!apiKey) {
        alert('API Key를 입력해주세요.');
        return;
      }

      var url = "https://api.odsay.com/v1/api/searchPubTransPathT"
        + "?SX=" + sx
        + "&SY=" + sy
        + "&EX=" + ex
        + "&EY=" + ey
        + "&apiKey=" + encodeURIComponent(apiKey);

      document.getElementById('status').textContent = '요청 중...';
      document.getElementById('status').className = 'status';
      document.getElementById('result').textContent = url + '\n\n로딩 중...';

      var xhr = new XMLHttpRequest();
      xhr.open("GET", url, true);
      xhr.send();
      xhr.onreadystatechange = function() {
        if (xhr.readyState == 4) {
          var statusEl = document.getElementById('status');
          var resultEl = document.getElementById('result');
          if (xhr.status == 200) {
            try {
              var parsed = JSON.parse(xhr.responseText);
              var hasError = parsed.error || (parsed.result && parsed.result.error);
              statusEl.textContent = hasError ? '❌ ODsay API 오류' : '✅ 성공';
              statusEl.className = 'status ' + (hasError ? 'err' : 'ok');
              resultEl.textContent = url + '\n\n' + JSON.stringify(parsed, null, 2);
            } catch(e) {
              statusEl.textContent = 'JSON 파싱 실패';
              statusEl.className = 'status err';
              resultEl.textContent = xhr.responseText;
            }
          } else {
            statusEl.textContent = '❌ HTTP ' + xhr.status;
            statusEl.className = 'status err';
            resultEl.textContent = 'HTTP ' + xhr.status + '\n' + xhr.responseText;
          }
        }
      };
    }
  </script>
</body>
</html>
